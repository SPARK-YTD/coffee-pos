<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إدارة المنتجات</title>

  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin: 5px; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; }
    .product { border: 1px solid #ccc; padding: 10px; margin: 5px 0; }
  </style>
</head>

<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "manager") {
  alert("ممنوع ❌");
  window.location.href = "login.html";
}
</script>

<h1>🛠️ إدارة المنتجات</h1>

<a href="index.html">⬅️ رجوع</a>

<hr>

<h3>➕ إضافة منتج</h3>

<input id="name" placeholder="اسم المنتج">
<input id="category" placeholder="التصنيف">
<input id="price" type="number" placeholder="السعر">
<input id="image" type="file">

<button onclick="addProduct()">إضافة</button>
<h4>📏 الأحجام (اختياري)</h4>

<input id="sizeName" placeholder="Small">
<input id="sizePrice" type="number" placeholder="السعر">

<button onclick="addSize()">➕ إضافة حجم</button>

<div id="sizes"></div>
  
<hr>

<h3>📦 المنتجات</h3>

<div id="products"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<script>

  let sizes = [];
  
  function addSize() {
  const name = document.getElementById("sizeName").value;
  const price = document.getElementById("sizePrice").value;

  if (!name || !price) {
    alert("اكتب الاسم والسعر ❌");
    return;
  }

  // منع التكرار
  const exists = sizes.find(s => s.name === name);
  if (exists) {
    alert("الحجم موجود ❌");
    return;
  }

  sizes.push({ name, price });

  renderSizes();

  document.getElementById("sizeName").value = "";
  document.getElementById("sizePrice").value = "";
}

function renderSizes() {
  const div = document.getElementById("sizes");
  div.innerHTML = "";

  sizes.forEach((s, index) => {
    div.innerHTML += `
      <div style="border:1px solid #ccc; margin:5px; padding:5px;">
        ${s.name} - ${s.price} BD
        <button onclick="removeSize(${index})">❌</button>
      </div>
    `;
  });
}
  
  function removeSize(index) {
  sizes.splice(index, 1);
  renderSizes();
}
  
async function loadProducts() {
  const { data } = await supabaseClient
    .from("products")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("products");
  container.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";

  div.innerHTML = `
  <img src="${p.image_url || 'no-image.png'}">
  <input id="name-${p.id}" value="${p.name}">
  <input id="cat-${p.id}" value="${p.category}">
  <input id="price-${p.id}" type="number" value="${p.price}">

  <br>

  <button onclick="updateProduct('${p.id}')">💾 حفظ</button>
  <button onclick="deleteProduct('${p.id}')">🗑️ حذف</button>
`;

    container.appendChild(div);
  });
}

  async function updateProduct(id) {
  const name = document.getElementById(`name-${id}`).value;
  const category = document.getElementById(`cat-${id}`).value;
  const price = document.getElementById(`price-${id}`).value;

  await supabaseClient
    .from("products")
    .update({ name, category, price })
    .eq("id", id);

  alert("تم التعديل ✅");
  loadProducts();
}

async function addProduct() {
  const name = document.getElementById("name").value;
  const category = document.getElementById("category").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("image").files[0];

if (!name || (sizes.length === 0 && !price)) {
  alert("اكمل البيانات ❌");
  return;
}

  let imageUrl = "";

  if (file) {
    const fileName = Date.now() + "-" + file.name;

    const { error: uploadError } = await supabaseClient
      .storage
      .from("products")
      .upload(fileName, file);

    if (uploadError) {
      console.error(uploadError);
      alert("خطأ في رفع الصورة ❌");
      return;
    }

    const { data } = supabaseClient
      .storage
      .from("products")
      .getPublicUrl(fileName);

    imageUrl = data.publicUrl;
  }

  // ✅ إنشاء المنتج
  const { data: product } = await supabaseClient
    .from("products")
    .insert([{    name,    category,    price: sizes.length > 0 ? null : parseFloat(price),   has_variants: sizes.length > 0,   image_url: imageUrl  }])
    .select()
    .single();

  // ✅ هنا نحفظ الأحجام (داخل الدالة)
  if (sizes.length > 0) {

  const variantRows = sizes.map(s => ({
  product_id: product.id,
  label: s.name,
  price: parseFloat(s.price),
  active: true
  }));

  await supabaseClient.from("product_variants").insert(variantRows);
    sizes = [];
    renderSizes();
  }

  // تنظيف
  document.getElementById("name").value = "";
  document.getElementById("category").value = "";
  document.getElementById("price").value = "";
  document.getElementById("image").value = "";

  loadProducts();
}
  
loadProducts();
</script>

</body>
</html>
