<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إدارة المنتجات</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      font-size: 18px;
      text-align: center;
    }

    .container {
      padding: 15px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }

    .sizes-box {
      background: #fafafa;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .sizes-list div {
      background: #eee;
      padding: 6px;
      margin: 5px 0;
      border-radius: 6px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .product-card {
      background: white;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }

    .product-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 5px;
    }

    .product-card input {
      font-size: 12px;
    }

    .actions button {
      width: 100%;
      margin-top: 5px;
    }

    .danger {
      background: #dc2626;
    }

    .back-btn {
      display: block;
      margin-bottom: 10px;
      text-decoration: none;
      color: black;
    }
  </style>
</head>

<body>

<header>⚙️ إدارة المنتجات</header>

<div class="container">

  <a href="index.html" class="back-btn">⬅️ رجوع للكاشير</a>

  <!-- إضافة منتج -->
  <div class="card">
    <h3>➕ إضافة منتج</h3>

    <input id="name" placeholder="اسم المنتج">
    <input id="category" placeholder="التصنيف (coffee / drinks)">
    <input id="price" type="number" placeholder="السعر (بدون أحجام)">
    <input id="image" type="file">

    <div class="sizes-box">
      <h4>📏 الأحجام (اختياري)</h4>

      <input id="sizeName" placeholder="Small">
      <input id="sizePrice" type="number" placeholder="السعر">

      <button onclick="addSize()">➕ إضافة حجم</button>

      <div id="sizes" class="sizes-list"></div>
    </div>

    <button onclick="addProduct()">💾 حفظ المنتج</button>
  </div>

  <!-- المنتجات -->
  <div class="card">
    <h3>📦 المنتجات</h3>

    <div id="products" class="products-grid"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="products.js"></script>

</body>
</html>
