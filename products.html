<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الإدارة</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f5f5f5;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px;margin-bottom:10px}
input{width:100%;margin:5px 0;padding:8px}
button{width:100%;padding:10px;background:#111;color:#fff}
</style>
</head>

<body>

<div class="card">
<h3>إضافة منتج</h3>

<input id="name" placeholder="اسم">
<input id="price" placeholder="السعر">

<input id="sizeName" placeholder="حجم">
<input id="sizePrice" placeholder="سعر الحجم">
<button onclick="addSize()">إضافة حجم</button>

<div id="sizes"></div>

<button onclick="addProduct()">حفظ</button>
</div>

<div id="products"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="products.js"></script>

</body>
</html>
