<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إضافة صنف</title>
</head>
<body>

<h2>➕ إضافة صنف</h2>

<input id="name" placeholder="اسم الصنف"><br><br>

<input id="price" type="number" step="0.001" placeholder="السعر الأساسي"><br><br>

<input type="file" id="image" accept="image/*"><br><br> 
  
<img id="preview" style="width:100px;display:none;margin-top:10px;"><br><br>
  
<select id="category">
  <option value="drinks">مشروبات</option>
  <option value="food">طعام</option>
</select><br><br>

<label>
  <input type="checkbox" id="hasVariants"> فيه أحجام؟
</label>

<div id="variantsBox" style="display:none">
  <h4>الأحجام</h4>

  <div>
    Small: <input id="smallPrice" type="number" step="0.001">
  </div>
  <div>
    Medium: <input id="mediumPrice" type="number" step="0.001">
  </div>
  <div>
    Large: <input id="largePrice" type="number" step="0.001">
  </div>
</div>

<br>

<textarea id="extras" placeholder="الإضافات (كل سطر = خيار)"></textarea>

<br><br>

<button onclick="addProduct()" id="submitBtn">➕ حفظ المنتج</button>

  <h3>📦 المنتجات الحالية</h3>

<table border="1" width="100%">
  <thead>
    <tr>
      <th>الاسم</th>
      <th>السعر</th>
      <th>الإجراءات</th>
    </tr>
  </thead>
  <tbody id="productsList"></tbody>
</table>

<script type="module" src="admin.js"></script>

<script>
document.getElementById("image").onchange = function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  const img = document.getElementById("preview");
  img.src = url;
  img.style.display = "block";
};
</script>
  
<script>
document.getElementById("hasVariants").onchange = function() {
  document.getElementById("variantsBox").style.display =
    this.checked ? "block" : "none";
};
</script>

</body>
</html>
