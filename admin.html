<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الإدارة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <style>
    /* 🔐 شاشة الدخول */
    .login-screen {
      position: fixed;
      inset: 0;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 260px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background: #6d4c41;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen" class="login-screen">

  <div class="login-box">
    <h2>🔐 دخول الإدارة</h2>

    <input id="loginPin" placeholder="أدخل PIN" type="password">

    <button onclick="login()">دخول</button>

    <p id="loginError" style="color:red; display:none;"></p>
  </div>

</div>

<!-- 🧠 ADMIN APP -->
<div id="adminApp" style="display:none;">

  <h2 style="text-align:center">⚙️ لوحة الإدارة</h2>
  <div id="openShiftsWarning" style="text-align:center; color:red; margin-bottom:10px;"></div>
  

  <!-- 🔘 التبويبات -->
  <div class="admin-tabs">
  <button class="tab active" data-tab="products" onclick="showAdminTab('products')">📦 الأصناف</button>
  <button class="tab" data-tab="employees" onclick="showAdminTab('employees')">👥 الموظفين</button>
  <button class="tab" data-tab="sales" onclick="showAdminTab('sales')">💰 المبيعات</button>
  <button class="tab" data-tab="shifts" onclick="showAdminTab('shifts')">🟢 الشفتات</button>
  <button class="tab" data-tab="inventory" onclick="showAdminTab('inventory')">📦 المواد</button>
</div>

  <!-- 📦 الأصناف -->
  <div id="productsTab" class="admin-section">
    <iframe 
      src="products.html" 
      style="width:100%; height:650px; border:none; border-radius:10px;">
    </iframe>
  </div>
  
  <!-- 📦 المواد الاستهلاكية -->
<div id="inventoryTab" class="admin-section" style="display:none;">

  <iframe 
    src="inventory.html" 
    style="width:100%; height:650px; border:none; border-radius:10px;">
  </iframe>

</div>

  <!-- 👥 الموظفين -->
  <div id="employeesTab" class="admin-section" style="display:none;">

    <h3>➕ إضافة موظف</h3>

    <input id="empName" placeholder="اسم الموظف"><br><br>

    <input id="empPin" placeholder="PIN"><br><br>

    <select id="empRole">
      <option value="employee">موظف</option>
      <option value="manager">مدير</option>
    </select><br><br>

    <button onclick="addEmployee()">➕ إضافة</button>

    <hr>

    <h3>👥 قائمة الموظفين</h3>
    <div id="employeesList"></div>

  </div>

<div id="salesTab" class="admin-section" style="display:none;">

  <h3>💰 المبيعات</h3>

  <div style="margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;">
    
    <select id="salesMode" onchange="handleSalesFilter()">
      <option value="today">📅 اليوم</option>
      <option value="month">🗓 هذا الشهر</option>
      <option value="range">📆 تحديد تاريخ</option>
    </select>

    <div id="dateRange" style="display:none;">
      من: <input type="date" id="salesFromDate">
      إلى: <input type="date" id="salesToDate">
      <button onclick="loadSales()">عرض</button>
    </div>

  </div>
  <div class="stats-grid" id="salesStats"></div>
  <div id="salesBox"></div>

</div>

<!-- 🟢 الشفتات -->
<div id="shiftsTab" class="admin-section" style="display:none;">

  <h3>🟢 الشفتات المفتوحة</h3>

  <div id="adminShifts"></div>

</div>

<!-- 👥 العملاء -->
<div id="customersTab" class="admin-section" style="display:none;">

  <h3>👥 العملاء</h3>

  <iframe 
    src="customers.html" 
    style="width:100%; height:650px; border:none; border-radius:10px;">
  </iframe>

</div>

<!-- 🔥 JS -->
<script type="module" src="admin.js"></script>

</body>
</html>
