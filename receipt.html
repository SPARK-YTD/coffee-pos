<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>فاتورة</title>
</head>
<body>

  <h2>☕ Coffee Receipt</h2>

  <div id="receipt">جاري التحميل...</div>

  <button onclick="window.print()">🖨️ طباعة</button>

  <script>
    const order = JSON.parse(localStorage.getItem("receipt"));

    const container = document.getElementById("receipt");

    if (!order) {
      container.innerHTML = "❌ ما فيه بيانات";
    } else {
      let html = "";

      order.items.forEach(item => {
        html += `<p>${item.name} - ${item.price} BD</p>`;
      });

      html += `<hr>`;
      html += `<h3>المجموع: ${order.total} BD</h3>`;

      container.innerHTML = html;
    }
  </script>

</body>
</html>
