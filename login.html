  <script type="module">
    import { supabase } from "./supabase.js";

    // لو المستخدم مسجل دخول بالفعل، روح للموقع
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = "index.html";
    }

    // معلومات الجهاز
    function getDeviceInfo() {
      const ua = navigator.userAgent;
      let device = "جهاز غير معروف";

      if (/iPhone/.test(ua)) device = "📱 iPhone";
      else if (/iPad/.test(ua)) device = "📱 iPad";
      else if (/Android/.test(ua)) device = "📱 Android";
      else if (/Mac/.test(ua)) device = "💻 Mac";
      else if (/Windows/.test(ua)) device = "💻 Windows";
      else if (/Linux/.test(ua)) device = "💻 Linux";

      let browser = "متصفح";
      if (/Chrome/.test(ua) && !/Edge/.test(ua)) browser = "Chrome";
      else if (/Safari/.test(ua) && !/Chrome/.test(ua)) browser = "Safari";
      else if (/Firefox/.test(ua)) browser = "Firefox";
      else if (/Edge/.test(ua)) browser = "Edge";

      return device + " - " + browser;
    }

    window.handleLogin = async function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("errorBox");
      const loginBtn = document.getElementById("loginBtn");
      const loading = document.getElementById("loading");

      errorBox.style.display = "none";

      if (!email || !password) {
        errorBox.textContent = "❌ ادخل البريد وكلمة المرور";
        errorBox.style.display = "block";
        return;
      }

      loginBtn.disabled = true;
      loading.style.display = "block";

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) {
          throw error;
        }

        if (data.user) {
          // تسجيل الجهاز
          const deviceInfo = getDeviceInfo();
          const deviceName = deviceInfo;

          try {
            const { data: deviceId } = await supabase.rpc("register_device", {
              p_device_name: deviceName,
              p_device_info: navigator.userAgent
            });

            if (deviceId) {
              localStorage.setItem("device_id", deviceId);
            }
          } catch (devErr) {
            console.warn("Failed to register device:", devErr);
          }

          // نجح! روح للموقع
          window.location.href = "index.html";
        }

      } catch (err) {
        console.error("Login error:", err);

        let errorMsg = "❌ خطأ في تسجيل الدخول";

        if (err.message) {
          if (err.message.includes("Invalid login credentials")) {
            errorMsg = "❌ البريد أو كلمة المرور غير صحيحة";
          } else if (err.message.includes("Email not confirmed")) {
            errorMsg = "❌ البريد غير مؤكد. تواصل مع المدير";
          } else {
            errorMsg = "❌ " + err.message;
          }
        }

        errorBox.textContent = errorMsg;
        errorBox.style.display = "block";

        loginBtn.disabled = false;
        loading.style.display = "none";
      }
    };

    // Enter key للدخول
    document.getElementById("password").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        handleLogin();
      }
    });

    document.getElementById("email").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        document.getElementById("password").focus();
      }
    });
  </script>
