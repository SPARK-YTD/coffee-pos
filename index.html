<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>الكاشير</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- ===== Top Bar ===== -->
<header class="topbar">
  <div class="topbar-title">☕ كاشير المقهى</div>

  <div class="menu-container">
    <button id="menuBtn" class="menu-btn">☰</button>

    <div id="menuDropdown" class="menu-dropdown">
      <button onclick="closeShift()">🔒 إغلاق الشفت</button>
      <button onclick="openShiftPrompt()">🟢 فتح شفت</button>
    </div>
  </div>
</header>

<main class="cashier-layout">

 <!-- الأصناف -->
<section class="card products-card">
    <h2>الأصناف</h2>

    <div class="categories">
      <button class="cat active" onclick="filterCategory('drinks', this)">🥤 مشروبات</button>
      <button class="cat" onclick="filterCategory('food', this)"> طعام</button>
    </div>

    <div id="items" class="items-grid"></div>
  </section>

 <!-- الفاتورة -->
<section class="card invoice-card">
    <h2>الفاتورة</h2>

    <table class="invoice-table">
      <thead>
        <tr>
          <th>الصنف</th>
          <th>الكمية</th>
          <th>المجموع</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cart"></tbody>
    </table>

    <div class="total-box">
      الإجمالي: <span id="total">0.000 ر.س</span>
    </div>

    <button onclick="completeOrder()" class="btn success">
  إتمام الطلب
</button>

  </section>

  <!-- الطلبات الجارية -->
<section class="card orders-card">

  <!-- التبويبات -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('active')">🟡 الجارية</button>
    <button class="tab" onclick="showTab('cancelled')">❌ الملغية</button>
  </div>

  <!-- الطلبات الجارية -->
  <div id="activeOrders" class="orders-list"></div>

  <!-- الطلبات الملغية -->
  <div id="cancelledOrders" class="orders-list" style="display:none;"></div>

</section>

</main>

<script type="module" src="app.js"></script>

<div id="printArea" class="print-area">

  <div class="receipt">

    <!-- اسم المحل -->
    <div class="receipt-header">
      <div class="title">☕ كاشير المقهى</div>
      <div>📍 البحرين</div>
    </div>

    <div class="line"></div>

    <!-- معلومات الطلب -->
    <div class="receipt-info">
      <div>رقم الطلب: <span id="printOrderId"></span></div>
      <div id="printDate"></div>
    </div>

    <div class="line"></div>

    <!-- العناصر -->
    <div class="receipt-items">

      <div class="receipt-row header">
        <span>الصنف</span>
        <span>العدد</span>
        <span>السعر</span>
      </div>

      <div id="printItems"></div>

    </div>

    <div class="line"></div>

    <!-- الإجمالي -->
    <div class="receipt-total">
      الإجمالي: <span id="printTotal"></span>
    </div>

    <div class="line"></div>

    <!-- الدفع -->
    <div id="printPayment" class="receipt-payment"></div>

    <div class="line"></div>

    <!-- رسالة -->
    <div class="receipt-footer">
      شكراً لزيارتكم ❤️
    </div>

  </div>

</div>
</body>
</html>
