<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>الكاشير</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="style.css?v=10" />
</head>

<body>

<!-- ===== Top Bar ===== -->
<header class="topbar">
  <div class="topbar-title">☕ كاشير المقهى</div>

  <div class="menu-container">
    <button id="menuBtn" class="menu-btn">☰</button>

    <div id="menuDropdown" class="menu-dropdown">
    <button onclick="closeShift()">🔒 إغلاق الشفت</button>
    <button onclick="closeDay()">📅 إغلاق اليوم</button> <!-- 🔥 جديد -->
    <button onclick="openShiftPrompt()">🟢 فتح شفت</button>
    <button onclick="showReport()">📊 تقرير الشفت</button>
    <button onclick="showShiftInfo()">🟢 الشفت المفتوح</button>
</div>
  </div>
</header>

<main class="cashier-layout">

 <!-- الأصناف -->
<section class="card products-card">
    <h2>الأصناف</h2>

    <div class="categories">
      <button class="cat active" onclick="filterCategory('drinks', this)">🥤 مشروبات</button>
      <button class="cat" onclick="filterCategory('food', this)"> طعام</button>
    </div>

    <div id="items" class="items-grid"></div>
  </section>

 <!-- الفاتورة -->
<section class="card invoice-card">
    <h2>الفاتورة</h2>

    <table class="invoice-table">
      <thead>
        <tr>
          <th>الصنف</th>
          <th>الكمية</th>
          <th>المجموع</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cart"></tbody>
    </table>

<div class="total-box">
  الإجمالي: <span id="total">0.000 ر.س</span>
</div>

<!-- 🔥 رقم العميل (اختياري) -->
<input 
  id="customerPhone" 
  placeholder="📱 رقم العميل (اختياري)"
  style="width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc"
/>

<!-- زر الدفع -->
<button onclick="completeOrder()" class="btn success">
  إتمام الطلب
</button>

<!-- 🔥 زر واتساب -->
<button onclick="sendReceiptWhatsApp()" class="btn" style="margin-top:8px">
  📲 إرسال الفاتورة واتساب
</button>

  </section>

  <!-- الطلبات الجارية -->
<section class="card orders-card">

  <!-- التبويبات -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('active')">🟡 الجارية</button>
    <button class="tab" onclick="showTab('cancelled')">❌ الملغية</button>
  </div>

  <!-- الطلبات الجارية -->
  <div id="activeOrders" class="orders-list"></div>

  <!-- الطلبات الملغية -->
  <div id="cancelledOrders" class="orders-list" style="display:none;"></div>

</section>

</main>


<!-- ===============================
   🧾 الفاتورة
================================ -->
<div id="printArea" class="receipt">

  <div class="header">قهوة ترانكيلا</div>
  <div class="sub">السعودية | الرياض 📍</div>

  <div class="divider"></div>

  <div class="invoice">
    🧾 فاتورة رقم <span id="printOrderId"></span>
  </div>

  <div class="divider"></div>

<div class="table-header">
  <span>الصنف</span>
  <span>الكمية</span>
  <span>السعر</span>
  <span>المجموع</span>
</div>

  <div id="printItems"></div>

  <div class="divider"></div>

  <div class="totals-box">

  <div class="totals-row">
    <span>المجموع الفرعي</span>
    <span id="printSubtotal"></span>
  </div>

  <div class="totals-row">
    <span>الضريبة (15%)</span>
    <span id="printVat"></span>
  </div>

  <div class="grand-box">
    <span>الإجمالي</span>
    <span id="printTotal"></span>
  </div>

</div>

  <div class="divider"></div>

  <div class="thanks">
  ☕ شكراً لزيارتكم ☕  
  <br><br>
  كل فنجان نقدمه بعناية...  
  لأن القهوة ليست مجرد مشروب،  
  بل لحظة هدوء وطاقة ليوم أجمل 🤍
</div>

  <div class="footer">
    📅 <span id="printDate"></span>
  </div>

</div>

<script type="module" src="app.js?v=1"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

</body>
</html>
