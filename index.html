<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>الكاشير</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }

    .topbar {
      background: #111;
      color: white;
      padding: 12px;
      text-align: center;
      font-weight: bold;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .categories {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    .cat {
      flex: 1;
      padding: 8px;
      border: none;
      background: #eee;
      cursor: pointer;
    }

    .cat.active {
      background: black;
      color: white;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .item {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
      cursor: pointer;
    }

    .item img {
      width: 70px;
      height: 70px;
      object-fit: cover;
    }

    table {
      width: 100%;
      text-align: center;
    }

    button {
      padding: 6px;
      cursor: pointer;
    }

    .total {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="topbar">🛒 الكاشير</div>

<div class="layout">

  <!-- المنتجات -->
  <div class="card">
    <div class="categories">
      <button class="cat active" onclick="filterCategory('food', this)">🍔</button>
      <button class="cat" onclick="filterCategory('drinks', this)">🥤</button>
      <button class="cat" onclick="filterCategory('sides', this)">🍟</button>
    </div>

    <div id="items" class="items"></div>
  </div>

  <!-- السلة -->
  <div class="card">
    <h3>📦 السلة</h3>

    <table>
      <tbody id="cart"></tbody>
    </table>

    <div id="total" class="total">0.000 BD</div>

    <button onclick="checkout()">إتمام الطلب</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
