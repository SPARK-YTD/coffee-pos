<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>☕ كاشير</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.top{background:#111;color:#fff;padding:15px;text-align:center;font-size:20px}
.layout{display:grid;grid-template-columns:2fr 1fr;gap:10px;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px}
.items{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.item{border:1px solid #ddd;padding:10px;text-align:center;cursor:pointer}
.item img{width:60px;height:60px}
button{padding:8px;border:none;background:#111;color:#fff;width:100%}
</style>
</head>

<body>

<div class="top">☕ كاشير المقهى</div>

<div class="layout">

<div class="card">
<div id="items" class="items"></div>
</div>

<div class="card">
<h3>السلة</h3>
<table id="cart"></table>
<div id="total">0.000 BD</div>
<button onclick="checkout()">إتمام الطلب</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>

</body>
</html>
