<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>الكاشير</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- ===== Top Bar ===== -->
<header class="topbar">
  <div class="topbar-title">
    ☕ كاشير المقهى
  </div>
</header>

<main class="cashier-layout">

 <!-- الأصناف -->
<section class="card products-card">
    <h2>الأصناف</h2>

    <div class="categories">
      <button class="cat active" onclick="filterCategory('drinks', this)">🥤 مشروبات</button>
      <button class="cat" onclick="filterCategory('food', this)">🍔 طعام</button>
    </div>

    <div id="items" class="items-grid"></div>
  </section>

 <!-- الفاتورة -->
<section class="card invoice-card">
    <h2>الفاتورة</h2>

    <table class="invoice-table">
      <thead>
        <tr>
          <th>الصنف</th>
          <th>الكمية</th>
          <th>المجموع</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cart"></tbody>
    </table>

    <div class="total-box">
      الإجمالي: <span id="total">0.000 ر.س</span>
    </div>

    <button id="completeOrderBtn" class="btn success" onclick="completeOrder()">
  إتمام الطلب
</button>

  </section>

  <!-- الطلبات الجارية -->
<section class="card orders-card">
    <h2>الطلبات الجارية</h2>
    <div id="activeOrders" class="orders-list"></div>
  </section>

</main>

<script type="module" src="app.js"></script>

<div id="printArea" class="print-area">
  <div class="receipt">

    <div class="title">☕ كاشير المقهى</div>

    <div class="receipt-no">
      رقم الطلب: <span id="printOrderId"></span>
    </div>

    <div id="printDate"></div>

    <hr>

    <div id="printItems"></div>

    <hr>

    <div class="total">
      الإجمالي: <span id="printTotal"></span>
    </div>

    <div id="printPayment"></div>

  </div>
</div>

</body>
</html>
