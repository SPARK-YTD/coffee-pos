<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الكاشير</title>

<style>
body {
  font-family: Arial;
  display: flex;
  gap: 20px;
  padding: 20px;
}

#items {
  flex: 2;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.item {
  border: 1px solid #ddd;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

#cartBox {
  flex: 1;
}

.popup-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

.variant-btn {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  background: #facc15;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.cancel-btn {
  margin-top: 10px;
  background: #eee;
  border: none;
  padding: 8px;
  border-radius: 6px;
}
</style>

</head>
<body>

<div id="items"></div>

<div id="cartBox">
  <h3>🛒 السلة</h3>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>الصنف</th>
        <th>الكمية</th>
        <th>السعر</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="cart"></tbody>
  </table>

  <h3 id="total">0 د.ب</h3>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
